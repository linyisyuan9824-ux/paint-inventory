<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>油漆庫存</title>
<style>
  :root {
    --bg:#F4F6F9; --surface:#fff; --surface2:#F0F2F5;
    --primary:#4A90D9; --primary-light:#EAF3FB;
    --success:#4CAF82; --danger:#E05252; --danger-light:#FDEAEA;
    --warn:#F08C30; --warn-light:#FEF3E6;
    --text:#2C3347; --text-sub:#6B7280; --border:#E4E8EE;
    --radius:14px; --radius-sm:8px; --shadow:0 2px 10px rgba(0,0,0,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,"Helvetica Neue",Arial,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;}

  .top-bar{background:var(--surface);padding:14px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.07);}
  .top-bar h1{font-size:18px;font-weight:700;}
  .top-bar p{font-size:11px;color:var(--text-sub);margin-top:1px;}
  .tab-bar{display:flex;gap:4px;overflow-x:auto;padding:10px 0 0;scrollbar-width:none;}
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab-btn{flex-shrink:0;padding:7px 15px;border:1.5px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;background:var(--surface2);color:var(--text-sub);}
  .tab-btn.active{background:var(--surface);color:var(--primary);font-weight:700;}

  .page{display:none;padding:16px;}
  .page.active{display:block;}

  .card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;}
  .card-title{font-size:15px;font-weight:700;margin-bottom:14px;}

  .form-row{margin-bottom:10px;}
  .form-2col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .form-2col-end{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;align-items:flex-end;}
  label{font-size:12px;font-weight:500;color:var(--text-sub);display:block;margin-bottom:4px;}
  input,select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:15px;color:var(--text);background:var(--surface2);outline:none;transition:border .15s;}
  input:focus,select:focus{border-color:var(--primary);background:#fff;}

  .btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 20px;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;}
  .btn:active{opacity:.8;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-success{background:var(--success);color:#fff;}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-ghost{background:var(--surface2);color:var(--text);border:1.5px solid var(--border);}
  .btn-warn{background:var(--warn);color:#fff;}
  .btn-sm{padding:5px 12px;font-size:12px;}
  .btn-full{width:100%;}

  /* SUMMARY */
  .summary-row{display:flex;gap:8px;margin-bottom:16px;}
  .summary-pill{flex:1;background:var(--surface);border-radius:var(--radius);padding:12px 8px;box-shadow:var(--shadow);text-align:center;border:1.5px solid var(--border);}
  .summary-pill .sp-val{font-size:26px;font-weight:700;color:var(--primary);}
  .summary-pill .sp-label{font-size:11px;color:var(--text-sub);margin-top:2px;}
  .summary-pill.warn .sp-val{color:var(--warn);}
  .summary-pill.crit .sp-val{color:var(--danger);}

  /* CATEGORY SECTION */
  .cat-section{margin-bottom:16px;}
  .cat-header{font-size:14px;font-weight:700;color:#fff;background:var(--text);padding:9px 16px;border-radius:10px 10px 0 0;}
  .cat-body{background:var(--surface);border:1.5px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}

  /* INV ITEM - single column */
  .inv-item{padding:16px;border-bottom:1.5px solid var(--border);position:relative;}
  .inv-item:last-child{border-bottom:none;}
  .inv-item.low{background:var(--warn-light);}
  .inv-item.critical{background:var(--danger-light);}
  .inv-badge{position:absolute;top:14px;right:14px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;color:#fff;}
  .inv-badge.low{background:var(--warn);}
  .inv-badge.crit{background:var(--danger);}
  .item-brand{font-size:12px;color:var(--text-sub);margin-bottom:4px;}
  .item-name{font-size:18px;font-weight:700;line-height:1.2;margin-bottom:10px;padding-right:60px;}

  /* gallon rows */
  .gallon-qtys{display:flex;flex-direction:column;gap:6px;}
  .gq-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:rgba(0,0,0,.03);border-radius:6px;}
  .gq-label{font-size:14px;color:var(--text-sub);}
  .gq-val{font-size:32px;font-weight:700;color:var(--primary);line-height:1;}
  .gq-val span{font-size:14px;font-weight:400;color:var(--text-sub);}
  .gq-low .gq-val{color:var(--warn);}
  .gq-crit .gq-val{color:var(--danger);}

  /* GALLON BOX (設定) */
  .gallon-box{border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:10px;}
  .gallon-box-title{background:var(--surface2);padding:8px 12px;font-size:12px;font-weight:600;color:var(--text-sub);border-bottom:1px solid var(--border);}
  .gallon-row{display:grid;grid-template-columns:58px 1fr 1fr 1fr;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);}
  .gallon-row:last-child{border-bottom:none;}
  .gl-label{font-size:14px;font-weight:700;}

  /* ORDER DRAFT */
  .draft-wrap{display:none;}
  .order-draft-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px;}
  .order-draft-table th{background:var(--text);color:#fff;padding:8px 10px;text-align:left;font-size:12px;font-weight:600;}
  .order-draft-table th:first-child{border-radius:6px 0 0 0;}
  .order-draft-table th:last-child{border-radius:0 6px 0 0;text-align:center;}
  .order-draft-table td{padding:9px 10px;border-bottom:1px solid var(--border);background:var(--surface);}
  .order-draft-table tr:nth-child(even) td{background:var(--surface2);}
  .order-draft-table tr:last-child td{border-bottom:none;}
  .draft-btn-row{display:flex;gap:8px;}

  /* ORDER LOG */
  .order-group{margin-bottom:14px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
  .order-group-header{background:var(--text);color:#fff;padding:9px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
  .order-group-header .order-no{font-size:11px;font-weight:400;opacity:.7;}
  .order-group-body{border:1px solid var(--border);border-top:none;}
  .order-row{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--surface);font-size:13px;}
  .order-row:last-child{border-bottom:none;}
  .order-row:nth-child(even){background:var(--surface2);}
  .or-main{flex:1;}
  .or-name{font-weight:600;}
  .or-sub{font-size:11px;color:var(--text-sub);margin-top:2px;}
  .or-qty{font-size:14px;font-weight:700;color:var(--primary);white-space:nowrap;}

  /* CHECK */
  .check-group{margin-bottom:12px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
  .check-group-header{padding:9px 14px;background:var(--text);color:#fff;font-size:13px;font-weight:700;}
  .check-thead{display:grid;grid-template-columns:1fr 55px 65px 55px;gap:4px;align-items:center;padding:7px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-sub);}
  .check-row{display:grid;grid-template-columns:1fr 55px 65px 55px;gap:4px;align-items:center;padding:9px 14px;background:var(--surface);border-bottom:1px solid var(--border);font-size:13px;}
  .check-row:last-child{border-bottom:none;}
  .check-row:nth-child(odd){background:#FAFBFD;}
  .check-row input[type=number]{padding:5px 6px;font-size:14px;text-align:center;}
  .cc{text-align:center;}
  .diff-pos{color:var(--success);font-weight:700;}
  .diff-neg{color:var(--danger);font-weight:700;}
  .diff-zero{color:var(--text-sub);}

  /* OUT INFO */
  #outInfo{background:var(--primary-light);border-radius:8px;padding:12px 14px;margin-bottom:10px;display:none;}
  .oi-label{font-size:12px;color:var(--text-sub);margin-bottom:6px;}
  .oi-gallon-row{display:flex;gap:20px;}
  .oi-g{text-align:center;}
  .oi-gval{font-size:28px;font-weight:700;color:var(--primary);line-height:1;}
  .oi-glabel{font-size:12px;color:var(--text-sub);margin-top:2px;}

  .out-row{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface);font-size:13px;}
  .out-row:last-child{border-bottom:none;}
  .out-row:nth-child(even){background:var(--surface2);}
  .out-row .out-main{font-weight:600;margin-bottom:3px;}
  .out-row .out-sub{font-size:11px;color:var(--text-sub);}

  /* MANAGE LIST */
  .manage-list{border:1.5px solid var(--border);border-radius:8px;overflow:hidden;margin-top:8px;}
  .manage-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:14px;font-weight:500;background:var(--surface);}
  .manage-item:last-child{border-bottom:none;}

  /* EDIT MODAL */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:flex-end;}
  .modal-bg.open{display:flex;}
  .modal-sheet{background:var(--surface);width:100%;border-radius:20px 20px 0 0;padding:20px;max-height:90vh;overflow-y:auto;}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}

  #toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(10px);background:#2C3347;color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:all .25s;z-index:9999;white-space:nowrap;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .empty-state{text-align:center;padding:36px 20px;color:var(--text-sub);font-size:13px;}
</style>
</head>
<body>

<div class="top-bar">
  <h1>油漆庫存</h1>
  <p id="topDate"></p>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('inv',this)">庫存</button>
    <button class="tab-btn" onclick="switchTab('order',this)">叫貨</button>
    <button class="tab-btn" onclick="switchTab('check',this)">點貨</button>
    <button class="tab-btn" onclick="switchTab('out',this)">出庫</button>
    <button class="tab-btn" onclick="switchTab('orderlog',this)">叫貨記錄</button>
    <button class="tab-btn" onclick="switchTab('add',this)">設定</button>
  </div>
</div>

<!-- 庫存 -->
<div id="page-inv" class="page active">
  <div class="summary-row" id="summaryRow"></div>
  <div id="invContent"></div>
</div>

<!-- 叫貨 -->
<div id="page-order" class="page">
  <div class="card">
    <div class="card-title">新增叫貨品項</div>
    <div class="form-row">
      <label>品項</label>
      <select id="orderItem" onchange="buildOrderGallonSel()"><option value="">-- 請選擇品項 --</option></select>
    </div>
    <div class="form-2col">
      <div>
        <label>加侖規格</label>
        <select id="orderGallon"><option value="">-- 請先選品項 --</option></select>
      </div>
      <div>
        <label>數量（桶）</label>
        <input type="number" id="orderQty" min="1" placeholder="桶數">
      </div>
    </div>
    <div class="form-row">
      <label>備註（可空白）</label>
      <input type="text" id="orderNote" placeholder="">
    </div>
    <button class="btn btn-primary btn-full" onclick="addOrderDraft()">加入叫貨清單</button>
  </div>
  <div class="draft-wrap" id="draftWrap">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;">
        <div class="card-title" style="margin:0;">叫貨清單</div>
        <div style="font-size:11px;color:var(--text-sub);" id="draftDate"></div>
      </div>
      <table class="order-draft-table">
        <thead><tr><th>品名</th><th>廠牌</th><th>規格</th><th>數量</th><th>備註</th><th style="text-align:center;">刪</th></tr></thead>
        <tbody id="draftBody"></tbody>
      </table>
    </div>
    <div class="draft-btn-row">
      <button class="btn btn-ghost btn-sm" onclick="clearDraft()" style="flex:1;">清除清單</button>
      <button class="btn btn-primary" onclick="submitDraft()" style="flex:2;">確認送出叫貨</button>
    </div>
  </div>
</div>

<!-- 點貨 -->
<div id="page-check" class="page">
  <div class="card">
    <div class="card-title">點貨清查</div>
    <p style="font-size:13px;color:var(--text-sub);margin-bottom:12px;">填入實際盤點桶數，系統自動計算差異</p>
    <button class="btn btn-primary btn-full" onclick="submitCheck()">儲存盤點結果</button>
  </div>
  <div id="checkContent"></div>
</div>

<!-- 出庫 -->
<div id="page-out" class="page">
  <div class="card">
    <div class="card-title">出庫登記</div>
    <div class="form-row">
      <label>品項</label>
      <select id="outItem" onchange="buildOutGallonSel()"><option value="">-- 請選擇品項 --</option></select>
    </div>
    <div class="form-2col">
      <div>
        <label>加侖規格</label>
        <select id="outGallon" onchange="fillOutInfo()"><option value="">-- 請先選品項 --</option></select>
      </div>
      <div>
        <label>出庫數量（桶）</label>
        <input type="number" id="outQty" min="1" placeholder="桶數">
      </div>
    </div>
    <div id="outInfo">
      <div class="oi-label">各規格現有庫存</div>
      <div class="oi-gallon-row" id="outInfoRow"></div>
    </div>
    <div class="form-2col">
      <div>
        <label>使用人員</label>
        <select id="outStaff"><option value="">-- 請選擇 --</option></select>
      </div>
      <div>
        <label>工作號</label>
        <input type="text" id="outJob" placeholder="例：A-123">
      </div>
    </div>
    <div class="form-row">
      <label>備註（可空白）</label>
      <input type="text" id="outNote" placeholder="">
    </div>
    <button class="btn btn-success btn-full" onclick="submitOut()">確認出庫</button>
  </div>
  <div class="card">
    <div class="card-title">近期出庫記錄</div>
    <div id="outLogList"></div>
  </div>
</div>

<!-- 叫貨記錄 -->
<div id="page-orderlog" class="page">
  <div id="orderLogContent"></div>
</div>

<!-- 設定 -->
<div id="page-add" class="page">

  <!-- 人員管理 -->
  <div class="card">
    <div class="card-title">人員管理</div>
    <div class="form-2col-end">
      <div><label>新增人員</label><input type="text" id="newStaffName" placeholder="姓名"></div>
      <button class="btn btn-primary btn-full" onclick="addStaff()">新增</button>
    </div>
    <div id="staffListEl" class="manage-list"></div>
  </div>

  <!-- 分類管理 -->
  <div class="card">
    <div class="card-title">分類管理</div>
    <div class="form-2col-end">
      <div><label>新增分類</label><input type="text" id="newCatName" placeholder="例：耐候漆"></div>
      <button class="btn btn-primary btn-full" onclick="addCat()">新增</button>
    </div>
    <div id="catListEl" class="manage-list"></div>
  </div>

  <!-- 廠牌管理 -->
  <div class="card">
    <div class="card-title">廠牌管理</div>
    <div class="form-2col-end">
      <div><label>新增廠牌</label><input type="text" id="newBrandName" placeholder="例：永記"></div>
      <button class="btn btn-primary btn-full" onclick="addBrand()">新增</button>
    </div>
    <div id="brandListEl" class="manage-list"></div>
  </div>

  <!-- 新增品項 -->
  <div class="card">
    <div class="card-title">新增油漆品項</div>
    <div class="form-2col">
      <div><label>品項名稱</label><input type="text" id="addName" placeholder="如 白 I-350 聚氨酯面漆"></div>
      <div><label>廠牌</label><select id="addBrand"><option value="">-- 選廠牌 --</option></select></div>
    </div>
    <div class="form-row">
      <label>分類</label>
      <select id="addCat"><option value="">-- 選分類 --</option></select>
    </div>
    <div class="gallon-box">
      <div class="gallon-box-title">各尺寸現有庫存（桶）、單價（元/桶）、警戒值（桶）— 不使用留空</div>
      <div class="gallon-row">
        <div class="gl-label">1 加侖</div>
        <div><label>桶數</label><input type="number" id="add1qty" min="0" placeholder="0"></div>
        <div><label>單價</label><input type="number" id="add1price" min="0" placeholder="單價"></div>
        <div><label>警戒</label><input type="number" id="add1warn" min="0" placeholder="5"></div>
      </div>
      <div class="gallon-row">
        <div class="gl-label">3 加侖</div>
        <div><label>桶數</label><input type="number" id="add3qty" min="0" placeholder="0"></div>
        <div><label>單價</label><input type="number" id="add3price" min="0" placeholder="單價"></div>
        <div><label>警戒</label><input type="number" id="add3warn" min="0" placeholder="5"></div>
      </div>
      <div class="gallon-row">
        <div class="gl-label">5 加侖</div>
        <div><label>桶數</label><input type="number" id="add5qty" min="0" placeholder="0"></div>
        <div><label>單價</label><input type="number" id="add5price" min="0" placeholder="單價"></div>
        <div><label>警戒</label><input type="number" id="add5warn" min="0" placeholder="5"></div>
      </div>
    </div>
    <button class="btn btn-primary btn-full" onclick="submitAdd()">新增品項</button>
  </div>

  <!-- 品項列表 / 編輯 -->
  <div class="card">
    <div class="card-title">品項管理</div>
    <div id="itemManageList"></div>
  </div>
</div>

<!-- 編輯品項 Modal -->
<div class="modal-bg" id="editModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">編輯品項</div>
    <input type="hidden" id="editId">
    <div class="form-2col">
      <div><label>品項名稱</label><input type="text" id="editName"></div>
      <div><label>廠牌</label><select id="editBrand"></select></div>
    </div>
    <div class="form-row">
      <label>分類</label>
      <select id="editCat"></select>
    </div>
    <div class="gallon-box">
      <div class="gallon-box-title">各尺寸現有庫存（桶）、單價、警戒值</div>
      <div class="gallon-row">
        <div class="gl-label">1 加侖</div>
        <div><label>桶數</label><input type="number" id="edit1qty" min="0"></div>
        <div><label>單價</label><input type="number" id="edit1price" min="0"></div>
        <div><label>警戒</label><input type="number" id="edit1warn" min="0"></div>
      </div>
      <div class="gallon-row">
        <div class="gl-label">3 加侖</div>
        <div><label>桶數</label><input type="number" id="edit3qty" min="0"></div>
        <div><label>單價</label><input type="number" id="edit3price" min="0"></div>
        <div><label>警戒</label><input type="number" id="edit3warn" min="0"></div>
      </div>
      <div class="gallon-row">
        <div class="gl-label">5 加侖</div>
        <div><label>桶數</label><input type="number" id="edit5qty" min="0"></div>
        <div><label>單價</label><input type="number" id="edit5price" min="0"></div>
        <div><label>警戒</label><input type="number" id="edit5warn" min="0"></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost" onclick="closeEdit()" style="flex:1;">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()" style="flex:2;">儲存</button>
    </div>
    <div style="margin-top:10px;">
      <button class="btn btn-danger btn-full" onclick="deleteItem()">刪除此品項</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

var db=firebase.firestore();

var GALLONS=['1','3','5'];

// ── 全域狀態 ──
var items=[], orderLogs=[], outLogs=[];
var staffList=[];
var categories=['底漆','中塗漆','面漆','耐熱漆','調薄劑'];
var brands=['柏林','永記'];
var orderDraft=[], checkInputs={};

// ── 工具 ──
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){
  if(!d)return'';
  if(d&&typeof d.toDate==='function')d=d.toDate();
  if(d instanceof Date)return d.toISOString().slice(0,10);
  return String(d).slice(0,10);
}
function formatDateCN(s){
  if(!s)return'';var p=s.split('-');
  return p[0]+'年'+p[1]+'月'+p[2]+'日';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}
function gQty(item,g){return parseInt(item['qty'+g])||0;}
function gPrice(item,g){return parseFloat(item['price'+g])||0;}
function gWarn(item,g){return parseInt(item['warn'+g])||0;}
function hasG(item,g){return item['qty'+g]!==undefined||item['price'+g]!==undefined||item['warn'+g]!==undefined;}

function itemLevel(item){
  var crit=false,low=false;
  GALLONS.forEach(function(g){
    if(!hasG(item,g))return;
    var qty=gQty(item,g),warn=gWarn(item,g);
    if(warn>0&&qty<=Math.max(1,Math.floor(warn*0.4)))crit=true;
    else if(warn>0&&qty<=warn)low=true;
  });
  return crit?'critical':low?'low':'';
}

function sortItems(){
  items.sort(function(a,b){
    var ai=categories.indexOf(a.category||'');
    var bi=categories.indexOf(b.category||'');
    if(ai<0)ai=999;if(bi<0)bi=999;
    return ai-bi||(a.name||'').localeCompare(b.name||'');
  });
}

// ── LOAD ──
function loadAll(){
  return Promise.all([
    db.collection('paintItems').get().then(function(s){
      items=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      sortItems();
    }),
    db.collection('orderLogs').get().then(function(s){
      orderLogs=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      orderLogs.sort(function(a,b){return fmtDate(b.date).localeCompare(fmtDate(a.date));});
    }),
    db.collection('outLogs').get().then(function(s){
      outLogs=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      outLogs.sort(function(a,b){
        var ta=a.createdAt&&a.createdAt.toDate?a.createdAt.toDate().getTime():0;
        var tb=b.createdAt&&b.createdAt.toDate?b.createdAt.toDate().getTime():0;
        return tb-ta;
      });
    }),
    db.collection('settings').doc('main').get().then(function(d){
      if(d.exists){
        var data=d.data();
        if(data.staff)staffList=data.staff;
        if(data.categories&&data.categories.length)categories=data.categories;
        if(data.brands&&data.brands.length)brands=data.brands;
      }
    })
  ]);
}

function saveSettings(){
  return db.collection('settings').doc('main').set({
    staff:staffList,categories:categories,brands:brands
  });
}

// ── TABS ──
function switchTab(tab,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('page-'+tab).classList.add('active');
  if(btn)btn.classList.add('active');
  if(tab==='inv')     renderInv();
  if(tab==='out')     {buildOutItemSel();buildStaffSel();renderOutLog();}
  if(tab==='order')   buildOrderItemSel();
  if(tab==='orderlog')renderOrderLog();
  if(tab==='check')   renderCheck();
  if(tab==='add')     {renderStaffList();renderCatList();renderBrandList();renderItemManage();buildAddSelects();}
}

function renderInv(){
  var total=items.length,lowCnt=0,critCnt=0;
  items.forEach(function(i){
    var lv=itemLevel(i);
    if(lv==='critical')critCnt++;
    else if(lv==='low')lowCnt++;
  });
  document.getElementById('summaryRow').innerHTML=
    '<div class="summary-pill"><div class="sp-val">'+total+'</div><div class="sp-label">品項總數</div></div>'+
    '<div class="summary-pill warn"><div class="sp-val">'+lowCnt+'</div><div class="sp-label">低庫存</div></div>'+
    '<div class="summary-pill crit"><div class="sp-val">'+critCnt+'</div><div class="sp-label">極低庫存</div></div>';

  // 依分類分組
  var groups={};
  var usedCats=[];
  items.forEach(function(item){
    var cat=item.category||'其他';
    if(!groups[cat]){groups[cat]=[];usedCats.push(cat);}
    groups[cat].push(item);
  });
  // 依 categories 順序排列，再加上不在清單的
  var orderedCats=[];
  categories.forEach(function(c){if(groups[c])orderedCats.push(c);});
  usedCats.forEach(function(c){if(orderedCats.indexOf(c)<0)orderedCats.push(c);});

  var html='';
  orderedCats.forEach(function(cat){
    if(!groups[cat]||!groups[cat].length)return;
    html+='<div class="cat-section"><div class="cat-header">'+esc(cat)+'</div><div class="cat-body">';
    groups[cat].forEach(function(item){
      var lv=itemLevel(item);
      var badge=lv==='critical'?'<div class="inv-badge crit">極低</div>':lv==='low'?'<div class="inv-badge low">低</div>':'';
      var gRows='';
      GALLONS.forEach(function(g){
        if(!hasG(item,g))return;
        var qty=gQty(item,g);
        var warn=gWarn(item,g);
        var gCrit=warn>0&&qty<=Math.max(1,Math.floor(warn*0.4));
        var gLow=!gCrit&&warn>0&&qty<=warn;
        var rowCls=gCrit?'gq-crit':gLow?'gq-low':'';
        gRows+='<div class="gq-row '+rowCls+'"><span class="gq-label">'+g+' 加侖</span><span class="gq-val">'+qty+'<span> 桶</span></span></div>';
      });
      // 舊格式相容
      if(!gRows){
        gRows='<div class="gq-row"><span class="gq-label">庫存</span><span class="gq-val">'+(item.qty||0)+'<span> 桶</span></span></div>';
      }
      html+='<div class="inv-item '+lv+'">'+badge+
        '<div class="item-brand">'+esc(item.brand||'')+'</div>'+
        '<div class="item-name">'+esc(item.name||'未命名')+'</div>'+
        '<div class="gallon-qtys">'+gRows+'</div>'+
        '</div>';
    });
    html+='</div></div>';
  });
  if(!items.length)html='<div class="empty-state">尚無品項，請至「設定」新增</div>';
  document.getElementById('invContent').innerHTML=html;
}

function addOrderDraft(){
  var id=document.getElementById('orderItem').value;
  var g=document.getElementById('orderGallon').value;
  var qty=parseInt(document.getElementById('orderQty').value)||0;
  var note=document.getElementById('orderNote').value.trim();
  if(!id||!g){showToast('請選擇品項與規格');return;}
  if(qty<=0){showToast('請輸入數量');return;}
  var item=items.find(function(i){return i.id===id;});
  orderDraft.push({itemId:id,name:item?item.name||'':'',brand:item?item.brand||'':'',gallon:g,qty:qty,note:note});
  document.getElementById('orderQty').value='';
  document.getElementById('orderNote').value='';
  renderDraft();showToast('已加入叫貨清單');
}

function renderDraft(){
  var wrap=document.getElementById('draftWrap');
  if(!orderDraft.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  document.getElementById('draftDate').textContent=formatDateCN(today());
  document.getElementById('draftBody').innerHTML=orderDraft.map(function(r,i){
    return '<tr><td><strong>'+esc(r.name)+'</strong></td><td>'+esc(r.brand)+'</td><td>'+esc(r.gallon)+' 加侖</td>'+
      '<td style="font-weight:700;color:var(--primary);">'+r.qty+' 桶</td><td>'+esc(r.note)+'</td>'+
      '<td style="text-align:center;"><button class="btn btn-danger btn-sm" onclick="removeDraft('+i+')">刪</button></td></tr>';
  }).join('');
}

function removeDraft(i){orderDraft.splice(i,1);renderDraft();}
function clearDraft(){orderDraft=[];renderDraft();}

function genOrderNo(date){
  var cnt=orderLogs.filter(function(l){return fmtDate(l.date)===date;}).length;
  return cnt===0?date:date+'-'+cnt;
}

function submitDraft(){
  if(!orderDraft.length){showToast('叫貨清單是空的');return;}
  var date=today(),orderNo=genOrderNo(date);
  Promise.all(orderDraft.map(function(r){
    var log={itemId:r.itemId,itemName:r.name,brand:r.brand,gallon:r.gallon,qty:r.qty,note:r.note,date:date,orderNo:orderNo,createdAt:firebase.firestore.FieldValue.serverTimestamp()};
    return db.collection('orderLogs').add(log).then(function(ref){orderLogs.unshift(Object.assign({id:ref.id},log));});
  })).then(function(){
    showToast('叫貨已送出（單號：'+orderNo+'）');
    orderDraft=[];renderDraft();
  });
}

function renderOrderLog(){
  var el=document.getElementById('orderLogContent');
  if(!orderLogs.length){el.innerHTML='<div class="empty-state">尚無叫貨記錄</div>';return;}
  var byDate={};
  orderLogs.forEach(function(l){var d=fmtDate(l.date);if(!byDate[d])byDate[d]=[];byDate[d].push(l);});
  var dates=Object.keys(byDate).sort(function(a,b){return b.localeCompare(a);});
  var html='';
  dates.forEach(function(d){
    var logs=byDate[d],nos=[];
    logs.forEach(function(l){if(nos.indexOf(l.orderNo||d)<0)nos.push(l.orderNo||d);});
    html+='<div class="order-group"><div class="order-group-header"><span>'+formatDateCN(d)+'</span><span class="order-no">單號：'+nos.join('、')+'</span></div><div class="order-group-body">';
    logs.forEach(function(l){
      html+='<div class="order-row"><div class="or-main"><div class="or-name">'+esc(l.itemName||'')+(l.brand?' ('+esc(l.brand)+')':'')+'</div>'+
        (l.gallon||l.note?'<div class="or-sub">'+(l.gallon?l.gallon+' 加侖':'')+(l.note?' · '+esc(l.note):'')+'</div>':'')+'</div>'+
        '<div class="or-qty">'+l.qty+' 桶</div></div>';
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
}

function submitOut(){
  var id=document.getElementById('outItem').value;
  var g=document.getElementById('outGallon').value;
  var qty=parseInt(document.getElementById('outQty').value)||0;
  var staff=document.getElementById('outStaff').value;
  var job=document.getElementById('outJob').value.trim();
  var note=document.getElementById('outNote').value.trim();
  if(!id||!g){showToast('請選擇品項與規格');return;}
  if(qty<=0){showToast('請輸入出庫數量');return;}
  var item=items.find(function(i){return i.id===id;});
  if(!item)return;
  var curQty=gQty(item,g);
  if(qty>curQty){showToast('出庫數量超過現有庫存（'+curQty+' 桶）');return;}
  var newQty=curQty-qty;
  var upd={};upd['qty'+g]=newQty;
  db.collection('paintItems').doc(id).update(upd).then(function(){
    item['qty'+g]=newQty;
    return db.collection('outLogs').add({
      itemId:id,itemName:item.name||'',brand:item.brand||'',
      gallon:g,qty:qty,staff:staff,job:job,note:note,date:today(),
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }).then(function(){
    ['outQty','outJob','outNote'].forEach(function(eid){document.getElementById(eid).value='';});
    document.getElementById('outStaff').value='';
    document.getElementById('outGallon').innerHTML='<option value="">-- 請先選品項 --</option>';
    document.getElementById('outItem').value='';
    document.getElementById('outInfo').style.display='none';
    showToast('出庫 '+qty+' 桶（'+g+' 加侖）');
    return db.collection('outLogs').get();
  }).then(function(s){
    outLogs=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    outLogs.sort(function(a,b){
      var ta=a.createdAt&&a.createdAt.toDate?a.createdAt.toDate().getTime():0;
      var tb=b.createdAt&&b.createdAt.toDate?b.createdAt.toDate().getTime():0;
      return tb-ta;
    });
    renderOutLog();
  });
}

function renderOutLog(){
  var el=document.getElementById('outLogList');
  if(!outLogs.length){el.innerHTML='<div class="empty-state">暫無記錄</div>';return;}
  el.innerHTML=outLogs.slice(0,30).map(function(l){
    var parts=[];
    if(l.gallon)parts.push(l.gallon+' 加侖');
    if(l.staff)parts.push(l.staff);
    if(l.job)parts.push('工作號：'+l.job);
    if(l.note)parts.push(l.note);
    return '<div class="out-row"><div class="out-main">'+esc(l.itemName||'')+(l.brand?' ('+esc(l.brand)+')':'')+
      ' — <span style="color:var(--primary);font-weight:700;">'+l.qty+' 桶</span></div>'+
      '<div class="out-sub">'+esc(l.date||'')+(parts.length?' · '+parts.map(esc).join(' · '):'')+'</div></div>';
  }).join('');
}

// 點貨
// ══════════════════════════════════════════
function renderCheck(){
  var el=document.getElementById('checkContent');
  var groups={};var orderedCats=[];
  items.forEach(function(item){
    var cat=item.category||'其他';
    if(!groups[cat]){groups[cat]=[];orderedCats.push(cat);}
    groups[cat].push(item);
  });
  var sorted=[];
  categories.forEach(function(c){if(groups[c])sorted.push(c);});
  orderedCats.forEach(function(c){if(sorted.indexOf(c)<0)sorted.push(c);});

  var html='';
  sorted.forEach(function(cat){
    if(!groups[cat]||!groups[cat].length)return;
    html+='<div class="check-group"><div class="check-group-header">'+esc(cat)+'</div>'+
      '<div class="check-thead"><div>品名</div><div class="cc">系統</div><div class="cc">實盤</div><div class="cc">差異</div></div>';
    groups[cat].forEach(function(item){
      var hasAny=false;
      GALLONS.forEach(function(g){
        if(!hasG(item,g))return;
        hasAny=true;
        var sys=gQty(item,g),ck=item.id+'_'+g;
        var val=checkInputs[ck]!==undefined?checkInputs[ck]:'';
        var diff=val!==''?(parseInt(val)-sys):null;
        var dCls=diff===null?'':diff>0?'diff-pos':diff<0?'diff-neg':'diff-zero';
        var dStr=diff===null?'—':diff>0?'+'+diff:String(diff);
        html+='<div class="check-row"><div><div style="font-weight:600;">'+esc(item.name||'')+'</div><div style="font-size:11px;color:var(--text-sub);">'+g+' 加侖</div></div>'+
          '<div class="cc" style="font-weight:700;color:var(--primary);">'+sys+'</div>'+
          '<div><input type="number" min="0" value="'+esc(val)+'" placeholder="—" onchange="setCheckInput(\''+ck+'\',this.value)"></div>'+
          '<div class="cc"><span class="'+dCls+'">'+dStr+'</span></div></div>';
      });
      if(!hasAny){
        var sys=item.qty||0,ck=item.id+'_old';
        var val=checkInputs[ck]!==undefined?checkInputs[ck]:'';
        var diff=val!==''?(parseInt(val)-sys):null;
        var dCls=diff===null?'':diff>0?'diff-pos':diff<0?'diff-neg':'diff-zero';
        var dStr=diff===null?'—':diff>0?'+'+diff:String(diff);
        html+='<div class="check-row"><div><div style="font-weight:600;">'+esc(item.name||'')+'</div><div style="font-size:11px;color:var(--text-sub);">'+(item.size||'')+'</div></div>'+
          '<div class="cc" style="font-weight:700;color:var(--primary);">'+sys+'</div>'+
          '<div><input type="number" min="0" value="'+esc(val)+'" placeholder="—" onchange="setCheckInput(\''+ck+'\',this.value)"></div>'+
          '<div class="cc"><span class="'+dCls+'">'+dStr+'</span></div></div>';
      }
    });
    html+='</div>';
  });
  if(!html)html='<div class="empty-state">尚無品項</div>';
  el.innerHTML=html;
}

function setCheckInput(k,val){checkInputs[k]=val;renderCheck();}

function submitCheck(){
  var keys=Object.keys(checkInputs).filter(function(k){return checkInputs[k]!=='';});
  if(!keys.length){showToast('請先填入實盤數量');return;}
  Promise.all(keys.map(function(k){
    var qty=parseInt(checkInputs[k]);
    if(isNaN(qty))return Promise.resolve();
    var parts=k.split('_'),itemId=parts[0],g=parts[1];
    var item=items.find(function(i){return i.id===itemId;});
    if(g==='old'){if(item)item.qty=qty;return db.collection('paintItems').doc(itemId).update({qty:qty});}
    else{if(item)item['qty'+g]=qty;var upd={};upd['qty'+g]=qty;return db.collection('paintItems').doc(itemId).update(upd);}
  })).then(function(){
    checkInputs={};
    showToast('盤點完成，已更新 '+keys.length+' 項');
    renderCheck();
  });
}

  el.innerHTML=categories.map(function(name,i){
    return '<div class="manage-item"><span>'+esc(name)+'</span><button class="btn btn-danger btn-sm" onclick="removeCat('+i+')">刪除</button></div>';
  }).join('');
}
function addCat(){
  var name=document.getElementById('newCatName').value.trim();
  if(!name){showToast('請輸入分類名稱');return;}
  if(categories.indexOf(name)>=0){showToast('已存在');return;}
  categories.push(name);saveSettings().then(function(){renderCatList();showToast('已新增');});
  document.getElementById('newCatName').value='';
}
function removeCat(i){categories.splice(i,1);saveSettings().then(function(){renderCatList();showToast('已刪除');});}

function renderBrandList(){
  var el=document.getElementById('brandListEl');
  el.innerHTML=brands.map(function(name,i){
    return '<div class="manage-item"><span>'+esc(name)+'</span><button class="btn btn-danger btn-sm" onclick="removeBrand('+i+')">刪除</button></div>';
  }).join('');
}
function addBrand(){
  var name=document.getElementById('newBrandName').value.trim();
  if(!name){showToast('請輸入廠牌名稱');return;}
  if(brands.indexOf(name)>=0){showToast('已存在');return;}
  brands.push(name);saveSettings().then(function(){renderBrandList();showToast('已新增');});
  document.getElementById('newBrandName').value='';
}
function removeBrand(i){brands.splice(i,1);saveSettings().then(function(){renderBrandList();showToast('已刪除');});}

function buildAddSelects(){
  var bSel=document.getElementById('addBrand');
  bSel.innerHTML='<option value="">-- 選廠牌 --</option>';
  brands.forEach(function(b){var o=document.createElement('option');o.value=b;o.textContent=b;bSel.appendChild(o);});
  var cSel=document.getElementById('addCat');
  cSel.innerHTML='<option value="">-- 選分類 --</option>';
  categories.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;cSel.appendChild(o);});
}

function renderItemManage(){
  var el=document.getElementById('itemManageList');
  if(!items.length){el.innerHTML='<div class="empty-state">尚無品項</div>';return;}
  el.innerHTML='<div class="manage-list">'+items.map(function(item){
    return '<div class="manage-item">'+
      '<div><div style="font-weight:600;font-size:14px;">'+esc(item.name||'')+'</div>'+
      '<div style="font-size:11px;color:var(--text-sub);">'+(item.brand||'')+(item.category?' · '+item.category:'')+'</div></div>'+
      '<button class="btn btn-warn btn-sm" onclick="openEdit(\''+item.id+'\')">編輯</button>'+
      '</div>';
  }).join('')+'</div>';
}

// ── 編輯品項 ──
function openEdit(id){
  var item=items.find(function(i){return i.id===id;});
  if(!item)return;
  document.getElementById('editId').value=id;
  document.getElementById('editName').value=item.name||'';

  // 填廠牌選單
  var bSel=document.getElementById('editBrand');
  bSel.innerHTML='<option value="">-- 選廠牌 --</option>';
  brands.forEach(function(b){var o=document.createElement('option');o.value=b;o.textContent=b;if(b===item.brand)o.selected=true;bSel.appendChild(o);});

  // 填分類選單
  var cSel=document.getElementById('editCat');
  cSel.innerHTML='<option value="">-- 選分類 --</option>';
  categories.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;if(c===item.category)o.selected=true;cSel.appendChild(o);});

  GALLONS.forEach(function(g){
    document.getElementById('edit'+g+'qty').value=item['qty'+g]!==undefined?item['qty'+g]:'';
    document.getElementById('edit'+g+'price').value=item['price'+g]!==undefined?item['price'+g]:'';
    document.getElementById('edit'+g+'warn').value=item['warn'+g]!==undefined?item['warn'+g]:'';
  });
  document.getElementById('editModal').classList.add('open');
}

function closeEdit(){document.getElementById('editModal').classList.remove('open');}

function saveEdit(){
  var id=document.getElementById('editId').value;
  var name=document.getElementById('editName').value.trim();
  var brand=document.getElementById('editBrand').value;
  var category=document.getElementById('editCat').value;
  if(!name){showToast('請輸入品名');return;}
  var data={name:name,brand:brand,category:category};
  GALLONS.forEach(function(g){
    var qty=document.getElementById('edit'+g+'qty').value;
    var price=document.getElementById('edit'+g+'price').value;
    var warn=document.getElementById('edit'+g+'warn').value;
    data['qty'+g]=qty!==''?parseInt(qty):firebase.firestore.FieldValue.delete();
    data['price'+g]=price!==''?parseFloat(price):firebase.firestore.FieldValue.delete();
    data['warn'+g]=warn!==''?parseInt(warn):firebase.firestore.FieldValue.delete();
  });
  db.collection('paintItems').doc(id).update(data).then(function(){
    var item=items.find(function(i){return i.id===id;});
    if(item)Object.assign(item,data);
    sortItems();
    closeEdit();
    renderItemManage();
    renderInv();
    showToast('已更新「'+name+'」');
  });
}

function deleteItem(){
  var id=document.getElementById('editId').value;
  var name=document.getElementById('editName').value;
  if(!confirm('確定要刪除「'+name+'」？'))return;
  db.collection('paintItems').doc(id).delete().then(function(){
    items=items.filter(function(i){return i.id!==id;});
    closeEdit();renderItemManage();renderInv();
    showToast('已刪除「'+name+'」');
  });
}

// ── 新增品項 ──
function submitAdd(){
  var name=document.getElementById('addName').value.trim();
  var brand=document.getElementById('addBrand').value;
  var category=document.getElementById('addCat').value;
  if(!name){showToast('請輸入品名');return;}
  var data={name:name,brand:brand,category:category,createdAt:firebase.firestore.FieldValue.serverTimestamp()};
  GALLONS.forEach(function(g){
    var qty=document.getElementById('add'+g+'qty').value;
    var price=document.getElementById('add'+g+'price').value;
    var warn=document.getElementById('add'+g+'warn').value;
    if(qty!=='')data['qty'+g]=parseInt(qty);
    if(price!=='')data['price'+g]=parseFloat(price);
    if(warn!=='')data['warn'+g]=parseInt(warn);
  });
  db.collection('paintItems').add(data).then(function(ref){
    items.push(Object.assign({id:ref.id},data));
    sortItems();
    ['addName','add1qty','add1price','add1warn','add3qty','add3price','add3warn','add5qty','add5price','add5warn']
      .forEach(function(eid){var el=document.getElementById(eid);if(el)el.value='';});
    document.getElementById('addBrand').value='';
    document.getElementById('addCat').value='';
    renderItemManage();renderInv();
    showToast('已新增「'+name+'」');
  });
}

// ── INIT ──
document.getElementById('topDate').textContent=
  new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

loadAll().then(function(){renderInv();}).catch(function(e){
  console.error(e);showToast('載入失敗，請重新整理');
});
</script>
</body>
</html>
